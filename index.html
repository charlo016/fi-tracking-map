<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>F1 Monaco — Suivi en Direct</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#e10600;--bg:#0b0b14;--surface:#13131f;--border:#2d2d45;--text:#f0f0f0;--muted:#888;--live:#00e676;--sw:220px}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
    header{height:50px;background:var(--surface);border-bottom:2px solid var(--red);display:flex;align-items:center;gap:14px;padding:0 18px;flex-shrink:0}
    .logo{font-size:18px;font-weight:900;color:var(--red);letter-spacing:-.5px;font-style:italic}
    .title{font-size:14px;font-weight:600}
    .badge{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
    .dot.live{background:var(--live);animation:beat 1.4s infinite}
    .dot.sim{background:#ffa040}
    @keyframes beat{0%{box-shadow:0 0 0 0 rgba(0,230,118,.7)}70%{box-shadow:0 0 0 6px rgba(0,230,118,0)}100%{box-shadow:0 0 0 0 rgba(0,230,118,0)}}
    .layout{display:flex;height:calc(100vh - 50px);overflow:hidden}
    #wrap{flex:1;position:relative;overflow:hidden;background:#08080f}
    canvas{display:block;width:100%;height:100%;touch-action:none}
    #side{width:var(--sw);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .sh{padding:11px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);border-bottom:1px solid var(--border);flex-shrink:0}
    #dlist{flex:1;overflow-y:auto;padding:6px 0}
    #dlist::-webkit-scrollbar{width:3px}
    #dlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .dr{display:flex;align-items:center;gap:9px;padding:6px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .12s}
    .dr:hover{background:rgba(255,255,255,.04)}
    .dr.on{background:rgba(255,255,255,.08)}
    .dc{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.25)}
    .dn{width:22px;font-size:11px;font-weight:700;color:var(--muted);text-align:right;flex-shrink:0}
    .dnm{flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .da{font-size:10px;font-weight:700;color:var(--muted)}
    .sf{padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);flex-shrink:0}
    .sr{display:flex;justify-content:space-between;margin-top:3px}
    .sr span:last-child{color:var(--text)}
    #tip{position:fixed;background:rgba(8,8,20,.97);border:1px solid var(--border);border-radius:10px;padding:13px 16px;min-width:190px;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .15s,transform .15s;z-index:200;box-shadow:0 12px 40px rgba(0,0,0,.7)}
    #tip.on{opacity:1;transform:translateY(0)}
    .th{display:flex;align-items:center;gap:9px;margin-bottom:10px}
    .td{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.4);flex-shrink:0}
    .tn{font-size:14px;font-weight:700}
    .tt{font-size:11px;color:var(--muted)}
    .tr{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:5px}
    .tr b{color:var(--text);font-weight:600}
    #controls{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(14,14,24,.93);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:11px;color:var(--muted);display:flex;gap:9px;align-items:center;z-index:20;white-space:nowrap;backdrop-filter:blur(6px)}
    .csep{width:1px;height:18px;background:var(--border);flex-shrink:0}
    .clbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
    .cbtn{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);padding:3px 9px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;transition:background .12s,border-color .12s;line-height:1.5;user-select:none}
    .cbtn:hover{background:rgba(255,255,255,.15)}
    .cbtn.active{background:var(--red);border-color:var(--red);color:#fff}
    #zlevel{color:var(--text);font-weight:600;min-width:38px;text-align:center;font-size:11px}
    #rtime{color:var(--text);font-weight:600}
    @media(max-width:640px){:root{--sw:150px}.title{display:none}.da{display:none}#controls{gap:5px;padding:5px 10px}.cbtn{padding:2px 7px;font-size:10px}}
  </style>
</head>
<body>
<header>
  <span class="logo">F1</span>
  <span class="title">Monaco Grand Prix 2024 — Replay</span>
  <div class="badge"><span class="dot sim" id="dot"></span><span id="lbl">Simulation</span></div>
</header>
<div class="layout">
  <div id="wrap">
    <canvas id="cv"></canvas>
    <div id="controls">
      <span>⏵ Tour <span id="rtime">1</span></span>
      <div class="csep"></div>
      <span class="clbl">Vitesse</span>
      <button class="cbtn" data-speed="0.25">¼×</button>
      <button class="cbtn" data-speed="0.5">½×</button>
      <button class="cbtn active" data-speed="1">1×</button>
      <button class="cbtn" data-speed="2">2×</button>
      <button class="cbtn" data-speed="4">4×</button>
      <div class="csep"></div>
      <span class="clbl">Zoom</span>
      <button class="cbtn" id="zout">−</button>
      <span id="zlevel">100%</span>
      <button class="cbtn" id="zin">+</button>
      <button class="cbtn" id="zreset" title="Réinitialiser la vue">⌂</button>
    </div>
  </div>
  <div id="side">
    <div class="sh">Légende Pilotes</div>
    <div id="dlist"></div>
    <div class="sf">
      <div class="sr"><span>En piste</span><span id="sc">20</span></div>
      <div class="sr"><span>Mode</span><span>Replay</span></div>
    </div>
  </div>
</div>
<div id="tip">
  <div class="th">
    <div class="td" id="tdc"></div>
    <div><div class="tn" id="tdn"></div><div class="tt" id="tdt"></div></div>
    <span style="margin-left:auto;font-size:20px" id="tdf"></span>
  </div>
  <div class="tr"><span>Numéro</span><b id="tdnum"></b></div>
  <div class="tr"><span>Position</span><b id="tdpos"></b></div>
  <div class="tr"><span>Équipe</span><b id="tdte"></b></div>
</div>
<script>
'use strict';

// ══ DRIVERS (Monaco 2024) ═══════════════════════════════
const DRIVERS = [
  {n:16,name:'Leclerc',   abbr:'LEC',team:'Ferrari',        col:'#E8002D',full:'Charles Leclerc',   flag:'🇲🇨',pos:1},
  {n:81,name:'Piastri',   abbr:'PIA',team:'McLaren',        col:'#FF8000',full:'Oscar Piastri',     flag:'🇦🇺',pos:2},
  {n:55,name:'Sainz',     abbr:'SAI',team:'Ferrari',        col:'#E8002D',full:'Carlos Sainz',      flag:'🇪🇸',pos:3},
  {n:4, name:'Norris',    abbr:'NOR',team:'McLaren',        col:'#FF8000',full:'Lando Norris',      flag:'🇬🇧',pos:4},
  {n:44,name:'Hamilton',  abbr:'HAM',team:'Mercedes',       col:'#00D2BE',full:'Lewis Hamilton',    flag:'🇬🇧',pos:5},
  {n:22,name:'Tsunoda',   abbr:'TSU',team:'RB',             col:'#6692FF',full:'Yuki Tsunoda',      flag:'🇯🇵',pos:6},
  {n:14,name:'Alonso',    abbr:'ALO',team:'Aston Martin',   col:'#229971',full:'Fernando Alonso',   flag:'🇪🇸',pos:7},
  {n:63,name:'Russell',   abbr:'RUS',team:'Mercedes',       col:'#00D2BE',full:'George Russell',    flag:'🇬🇧',pos:8},
  {n:1, name:'Verstappen',abbr:'VER',team:'Red Bull Racing',col:'#3671C6',full:'Max Verstappen',    flag:'🇳🇱',pos:9},
  {n:11,name:'Perez',     abbr:'PER',team:'Red Bull Racing',col:'#3671C6',full:'Sergio Perez',      flag:'🇲🇽',pos:10},
  {n:20,name:'Magnussen', abbr:'MAG',team:'Haas F1 Team',   col:'#B6BABD',full:'Kevin Magnussen',   flag:'🇩🇰',pos:11},
  {n:27,name:'Hülkenberg',abbr:'HUL',team:'Haas F1 Team',   col:'#B6BABD',full:'Nico Hülkenberg',   flag:'🇩🇪',pos:12},
  {n:23,name:'Albon',     abbr:'ALB',team:'Williams',       col:'#64C4FF',full:'Alexander Albon',   flag:'🇹🇭',pos:13},
  {n:10,name:'Gasly',     abbr:'GAS',team:'Alpine',         col:'#FF87BC',full:'Pierre Gasly',      flag:'🇫🇷',pos:14},
  {n:31,name:'Ocon',      abbr:'OCO',team:'Alpine',         col:'#FF87BC',full:'Esteban Ocon',      flag:'🇫🇷',pos:15},
  {n:77,name:'Bottas',    abbr:'BOT',team:'Kick Sauber',    col:'#52E252',full:'Valtteri Bottas',   flag:'🇫🇮',pos:16},
  {n:24,name:'Zhou',      abbr:'ZHO',team:'Kick Sauber',    col:'#52E252',full:'Guanyu Zhou',       flag:'🇨🇳',pos:17},
  {n:3, name:'Ricciardo', abbr:'RIC',team:'RB',             col:'#6692FF',full:'Daniel Ricciardo',  flag:'🇦🇺',pos:18},
  {n:18,name:'Stroll',    abbr:'STR',team:'Aston Martin',   col:'#229971',full:'Lance Stroll',      flag:'🇨🇦',pos:19},
  {n:2, name:'Sargeant',  abbr:'SAR',team:'Williams',       col:'#64C4FF',full:'Logan Sargeant',    flag:'🇺🇸',pos:20},
];
const BY_NUM = {};
DRIVERS.forEach(d => BY_NUM[d.n] = d);

// ══ MONACO TRACK WAYPOINTS ══════════════════════════════
const WP = [
  [85,450],[180,450],[270,450],[355,450],[435,447],
  [476,440],[505,426],[519,404],[520,378],
  [514,352],[502,326],[484,302],
  [460,282],[432,270],[402,272],[378,285],
  [359,303],[344,326],[333,353],[324,382],
  [318,410],[314,434],[318,452],[332,461],[352,463],[372,457],[388,444],
  [401,428],[410,409],[413,388],[410,366],[405,346],
  [412,334],[448,330],[486,328],[524,329],[562,333],[598,340],[630,350],
  [656,364],[670,382],[662,402],
  [648,416],[622,428],[591,436],[558,441],
  [524,443],[495,448],[476,460],[471,475],[478,487],[494,492],[512,492],
  [530,491],[546,483],[550,472],[542,462],[526,458],[508,460],
  [487,462],[458,461],[418,459],[368,456],[308,453],[248,451],[178,450],[85,450]
];

// ══ CATMULL-ROM SPLINE + ARC LENGTH ═════════════════════
(function(){
  const N=2000; window.ARC=[]; window.APTS=[]; const n=WP.length;
  for(let i=0;i<N;i++){
    const t=(i/N)*n, idx=Math.floor(t), f=t-idx;
    const p0=WP[(idx-1+n)%n],p1=WP[idx%n],p2=WP[(idx+1)%n],p3=WP[(idx+2)%n];
    const f2=f*f,f3=f2*f;
    APTS.push([
      .5*((2*p1[0])+(-p0[0]+p2[0])*f+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*f2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*f3),
      .5*((2*p1[1])+(-p0[1]+p2[1])*f+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*f2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*f3)
    ]);
  }
  ARC.push(0);
  for(let i=1;i<N;i++){const dx=APTS[i][0]-APTS[i-1][0],dy=APTS[i][1]-APTS[i-1][1];ARC.push(ARC[i-1]+Math.sqrt(dx*dx+dy*dy));}
  window.TLEN=ARC[N-1]; window.N_PTS=N;
})();

function progressToWP(p){
  const tgt=((p%1)+1)%1*TLEN; let lo=0,hi=N_PTS-1;
  while(lo<hi){const m=(lo+hi)>>1; ARC[m]<tgt?lo=m+1:hi=m;}
  return APTS[lo];
}

// ══ BASE COORDINATE MAPPING ══════════════════════════════
const BXB={min:Math.min(...WP.map(p=>p[0])),max:Math.max(...WP.map(p=>p[0]))};
const BYB={min:Math.min(...WP.map(p=>p[1])),max:Math.max(...WP.map(p=>p[1]))};

let canvas, ctx;

function toC(x,y){
  const PAD=42, w=canvas.width-PAD*2, h=canvas.height-PAD*2;
  const sx=(BXB.max-BXB.min)||1, sy=(BYB.max-BYB.min)||1;
  const sc=Math.min(w/sx,h/sy);
  return{cx:PAD+(w-sx*sc)/2+(x-BXB.min)*sc, cy:PAD+(h-sy*sc)/2+(y-BYB.min)*sc};
}

function pToC(p){const wp=progressToWP(p);return toC(wp[0],wp[1]);}

// ══ ZOOM / PAN ═══════════════════════════════════════════
let vz=1, vpx=0, vpy=0;

function clampPan(){
  const w=canvas.width,h=canvas.height,m=Math.min(w,h)*.15;
  vpx=Math.max(m-w*vz,Math.min(w-m,vpx));
  vpy=Math.max(m-h*vz,Math.min(h-m,vpy));
}

function zoomAt(cx,cy,factor){
  const nz=Math.max(.4,Math.min(8,vz*factor));
  vpx=cx-(cx-vpx)*(nz/vz); vpy=cy-(cy-vpy)*(nz/vz);
  vz=nz; clampPan(); updateZD();
}

function updateZD(){
  document.getElementById('zlevel').textContent=Math.round(vz*100)+'%';
}

// Screen canvas px → base canvas px (undoes zoom+pan)
function toBase(cx,cy){return{bx:(cx-vpx)/vz, by:(cy-vpy)/vz};}
// Client coords → canvas px
function clientToCanvas(e){
  const r=canvas.getBoundingClientRect();
  return{cx:(e.clientX-r.left)*(canvas.width/r.width), cy:(e.clientY-r.top)*(canvas.height/r.height)};
}

// ══ SIMULATION ═══════════════════════════════════════════
const LAP_MS=8000, TRAIL_N=14, DOT_R=9;
const ORDER=DRIVERS.map(d=>d.n);
const GAPS=[0,.010,.011,.022,.040,.042,.044,.058,.085,.090,.092,.093,.30,.32,.34,.36,.38,.40,.42,.44];
const state={};
ORDER.forEach((num,i)=>{ state[num]={prog:1-GAPS[i],speed:1-i*.00015,trail:[]}; });

let lapCount=1, lastLP=state[ORDER[0]].prog, selectedNum=null, speedMult=1;

// ══ RENDER ═══════════════════════════════════════════════
function redraw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(vz,0,0,vz,vpx,vpy);
  drawTrack(); drawTrails(); drawDots();
  ctx.setTransform(1,0,0,1,0,0);
}

function drawTrack(){
  const pts=APTS.filter((_,i)=>i%4===0).map(p=>toC(p[0],p[1]));
  ctx.save(); ctx.lineCap=ctx.lineJoin='round';
  ctx.strokeStyle='rgba(60,60,120,.14)'; ctx.lineWidth=24; closedPath(pts); ctx.stroke();
  ctx.strokeStyle='#1a1a2c'; ctx.lineWidth=14; closedPath(pts); ctx.stroke();
  ctx.strokeStyle='#252538'; ctx.lineWidth=10; closedPath(pts); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.05)'; ctx.lineWidth=1.5; ctx.setLineDash([9,15]);
  closedPath(pts); ctx.stroke(); ctx.setLineDash([]);
  ctx.restore();
}

function closedPath(pts){
  ctx.beginPath(); ctx.moveTo(pts[0].cx,pts[0].cy);
  pts.forEach(p=>ctx.lineTo(p.cx,p.cy)); ctx.closePath();
}

function drawTrails(){
  ORDER.forEach(num=>{
    const s=state[num]; if(s.trail.length<2)return;
    const col=BY_NUM[num].col;
    ctx.save(); ctx.lineCap='round';
    for(let i=1;i<s.trail.length;i++){
      const a=(i/s.trail.length)*.55;
      ctx.strokeStyle=col+Math.round(a*255).toString(16).padStart(2,'0');
      ctx.lineWidth=1.5+2.5*(i/s.trail.length);
      const{cx:ax,cy:ay}=s.trail[i-1],{cx:bx,cy:by}=s.trail[i];
      ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
    }
    ctx.restore();
  });
}

function drawDots(){
  ORDER.forEach(num=>{
    const s=state[num],d=BY_NUM[num];
    const{cx,cy}=pToC(s.prog);
    const sel=selectedNum===num, r=sel?DOT_R+3:DOT_R;
    ctx.save();
    if(sel){ctx.shadowColor=d.col;ctx.shadowBlur=22;}
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle=d.col; ctx.fill();
    ctx.strokeStyle=sel?'#fff':'rgba(255,255,255,.6)';
    ctx.lineWidth=sel?2.5:1.5; ctx.stroke();
    ctx.shadowBlur=0; ctx.fillStyle='#fff';
    ctx.font=`bold ${r<10?7:8}px 'Segoe UI',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(d.abbr,cx,cy); ctx.restore();
  });
}

// ══ ANIMATION LOOP ═══════════════════════════════════════
let lastT=null;

function frame(ts){
  if(lastT===null)lastT=ts;
  const dt=Math.min(ts-lastT,100); lastT=ts;
  const step=(dt/LAP_MS)*speedMult;
  ORDER.forEach(num=>{
    const s=state[num];
    const{cx,cy}=pToC(s.prog);
    s.trail.push({cx,cy});
    if(s.trail.length>TRAIL_N)s.trail.shift();
    s.prog=(s.prog+step*s.speed)%1;
  });
  const lp=state[ORDER[0]].prog;
  if(lastLP>0.9&&lp<0.1)lapCount++;
  lastLP=lp;
  document.getElementById('rtime').textContent=lapCount;
  redraw();
  requestAnimationFrame(frame);
}

// ══ MOUSE DRAG / CLICK ═══════════════════════════════════
let drag=null;

canvas.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  const{cx,cy}=clientToCanvas(e);
  drag={sx:e.clientX,sy:e.clientY,px:vpx,py:vpy,moved:false,ccx:cx,ccy:cy};
  canvas.style.cursor='grabbing';
});

canvas.addEventListener('mousemove',e=>{
  if(drag){
    const dx=e.clientX-drag.sx,dy=e.clientY-drag.sy;
    if(Math.hypot(dx,dy)>4)drag.moved=true;
    if(drag.moved){vpx=drag.px+dx; vpy=drag.py+dy; clampPan();}
    return;
  }
  const{cx,cy}=clientToCanvas(e);
  const{bx,by}=toBase(cx,cy);
  const hit=hitTest(bx,by);
  canvas.style.cursor=hit?'pointer':'default';
  if(hit&&!selectedNum)showTip(e.clientX,e.clientY,hit);
  else if(!hit&&!selectedNum)hideTip();
});

canvas.addEventListener('mouseup',e=>{
  if(!drag)return;
  if(!drag.moved){
    const{bx,by}=toBase(drag.ccx,drag.ccy);
    const hit=hitTest(bx,by);
    selectedNum=(selectedNum===hit)?null:hit;
    document.querySelectorAll('.dr').forEach(el=>el.classList.toggle('on',parseInt(el.dataset.n)===selectedNum));
    if(selectedNum)showTip(e.clientX,e.clientY,selectedNum); else hideTip();
  }
  drag=null; canvas.style.cursor='default';
});

canvas.addEventListener('mouseleave',()=>{drag=null; canvas.style.cursor='default'; if(!selectedNum)hideTip();});

// ══ MOUSE WHEEL ZOOM ════════════════════════════════════
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const{cx,cy}=clientToCanvas(e);
  zoomAt(cx,cy,e.deltaY<0?1.15:1/1.15);
},{passive:false});

// ══ TOUCH (PINCH + PAN + TAP) ════════════════════════════
let tc=null;

function tp(t){const r=canvas.getBoundingClientRect();return{x:(t.clientX-r.left)*(canvas.width/r.width),y:(t.clientY-r.top)*(canvas.height/r.height)};}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const p=tp(e.touches[0]);
    tc={mode:'pan',x:p.x,y:p.y,px:vpx,py:vpy,moved:false};
  } else if(e.touches.length===2){
    const a=tp(e.touches[0]),b=tp(e.touches[1]);
    tc={mode:'pinch',dist:Math.hypot(b.x-a.x,b.y-a.y),mx:(a.x+b.x)/2,my:(a.y+b.y)/2,zoom:vz,px:vpx,py:vpy};
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!tc)return;
  if(tc.mode==='pan'&&e.touches.length===1){
    const p=tp(e.touches[0]);
    const dx=p.x-tc.x,dy=p.y-tc.y;
    if(Math.hypot(dx,dy)>6)tc.moved=true;
    vpx=tc.px+dx; vpy=tc.py+dy; clampPan();
  } else if(tc.mode==='pinch'&&e.touches.length===2){
    const a=tp(e.touches[0]),b=tp(e.touches[1]);
    const dist=Math.hypot(b.x-a.x,b.y-a.y);
    const mx2=(a.x+b.x)/2,my2=(a.y+b.y)/2;
    const nz=Math.max(.4,Math.min(8,tc.zoom*(dist/tc.dist)));
    vpx=mx2-(tc.mx-tc.px)*(nz/tc.zoom);
    vpy=my2-(tc.my-tc.py)*(nz/tc.zoom);
    vz=nz; clampPan(); updateZD();
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  if(e.touches.length===0){
    if(tc&&tc.mode==='pan'&&!tc.moved){
      const{bx,by}=toBase(tc.x,tc.y);
      const hit=hitTest(bx,by);
      selectedNum=(selectedNum===hit)?null:hit;
      document.querySelectorAll('.dr').forEach(el=>el.classList.toggle('on',parseInt(el.dataset.n)===selectedNum));
      const t=e.changedTouches[0];
      if(selectedNum)showTip(t.clientX,t.clientY,selectedNum); else hideTip();
    }
    tc=null;
  } else if(e.touches.length===1&&tc?.mode==='pinch'){
    const p=tp(e.touches[0]);
    tc={mode:'pan',x:p.x,y:p.y,px:vpx,py:vpy,moved:false};
  }
},{passive:false});

// ══ HIT TEST ════════════════════════════════════════════
function hitTest(bx,by){
  const HIT=DOT_R+8; let best=null,bd=HIT;
  ORDER.forEach(num=>{
    const{cx,cy}=pToC(state[num].prog);
    const d=Math.hypot(bx-cx,by-cy);
    if(d<bd){bd=d;best=num;}
  });
  return best;
}

// ══ TOOLTIP ═════════════════════════════════════════════
function showTip(px,py,num){
  const d=BY_NUM[num];
  document.getElementById('tdc').style.background=d.col;
  document.getElementById('tdn').textContent=d.full;
  document.getElementById('tdt').textContent=d.team;
  document.getElementById('tdf').textContent=d.flag;
  document.getElementById('tdnum').textContent='#'+num;
  document.getElementById('tdpos').textContent='P'+d.pos;
  document.getElementById('tdte').textContent=d.team;
  const tip=document.getElementById('tip');
  tip.style.left=Math.min(px+14,window.innerWidth-210)+'px';
  tip.style.top=Math.min(py-20,window.innerHeight-170)+'px';
  tip.classList.add('on');
}
function hideTip(){document.getElementById('tip').classList.remove('on');}

// ══ SIDEBAR ═════════════════════════════════════════════
function buildSidebar(){
  const list=document.getElementById('dlist'); list.innerHTML='';
  DRIVERS.forEach(d=>{
    const row=document.createElement('div');
    row.className='dr'; row.dataset.n=d.n; row.style.borderLeftColor=d.col;
    row.innerHTML=`<div class="dc" style="background:${d.col}"></div><div class="dn">${d.n}</div><div class="dnm">${d.name}</div><div class="da">${d.abbr}</div>`;
    row.addEventListener('click',()=>{
      selectedNum=(selectedNum===d.n)?null:d.n;
      document.querySelectorAll('.dr').forEach(el=>el.classList.toggle('on',parseInt(el.dataset.n)===selectedNum));
      if(selectedNum){
        const{cx,cy}=pToC(state[d.n].prog);
        const r=canvas.getBoundingClientRect();
        const sx=(cx*vz+vpx)*(r.width/canvas.width)+r.left;
        const sy=(cy*vz+vpy)*(r.height/canvas.height)+r.top;
        showTip(sx,sy,d.n);
      } else hideTip();
    });
    list.appendChild(row);
  });
}

// ══ CONTROLS ════════════════════════════════════════════
document.querySelectorAll('.cbtn[data-speed]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    speedMult=parseFloat(btn.dataset.speed);
    document.querySelectorAll('.cbtn[data-speed]').forEach(b=>b.classList.toggle('active',b===btn));
  });
});
document.getElementById('zin').addEventListener('click',()=>zoomAt(canvas.width/2,canvas.height/2,1.3));
document.getElementById('zout').addEventListener('click',()=>zoomAt(canvas.width/2,canvas.height/2,1/1.3));
document.getElementById('zreset').addEventListener('click',()=>{vz=1;vpx=0;vpy=0;updateZD();});

// ══ BOOT ════════════════════════════════════════════════
function sizeCanvas(){
  const w=document.getElementById('wrap');
  canvas.width=w.clientWidth; canvas.height=w.clientHeight;
}

function boot(){
  canvas=document.getElementById('cv'); ctx=canvas.getContext('2d');
  sizeCanvas();
  window.addEventListener('resize',()=>{ sizeCanvas(); redraw(); });
  buildSidebar();
  requestAnimationFrame(frame);
  tryLive();
}

async function tryLive(){
  try{
    const r=await fetch('https://api.openf1.org/v1/sessions?circuit_short_name=Monaco&year=2024&session_name=Race');
    if(r.ok){const s=await r.json();if(s.length){document.getElementById('dot').className='dot live';document.getElementById('lbl').textContent='API disponible';}}
  }catch{}
}

boot();
</script>
